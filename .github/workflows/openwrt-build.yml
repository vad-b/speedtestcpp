name: "Build OpenWrt package"

on:
  workflow_dispatch: {}
  push:
    branches:
      - "master"
    paths:
      - "src/**"
      - "include/**"
      - "examples/**"
      - "Makefile"
      - "Makefile.inc"
      - "openwrt/**"
      - ".github/workflows/openwrt-build.yml"
  release:
    types: [published]

permissions:
  contents: write

env:
  TZ: UTC

jobs:
  build:
    name: ${{ matrix.openwrt_release }} ${{ matrix.target }} (${{ matrix.package_ext }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - openwrt_release: "25.12.4"
            target: "mediatek/filogic"
            arch: "aarch64_cortex-a53"
            package_ext: "apk"
            gcc_version: "14.3.0"
            feeds_branch: "openwrt-25.12"
            extra_config: "CONFIG_USE_APK=y"
    steps:
      - name: Checkout speedtestcpp
        uses: actions/checkout@v4
        with:
          path: speedtestcpp

      - name: Install build dependencies
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget zstd
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean

      - name: Compute SDK URL & cache key
        id: sdk_meta
        run: |
          target_path="${{ matrix.target }}"
          target_slug="${target_path//\//-}"
          sdk_file="openwrt-sdk-${{ matrix.openwrt_release }}-${target_slug}_gcc-${{ matrix.gcc_version }}_musl.Linux-x86_64.tar.zst"
          sdk_url="https://downloads.openwrt.org/releases/${{ matrix.openwrt_release }}/targets/${target_path}/${sdk_file}"
          echo "sdk_file=${sdk_file}" >> "$GITHUB_OUTPUT"
          echo "sdk_url=${sdk_url}" >> "$GITHUB_OUTPUT"
          echo "sdk_cache_key=openwrt-sdk-${{ matrix.openwrt_release }}-${target_slug}" >> "$GITHUB_OUTPUT"

      - name: Cache OpenWrt SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: sdk
          key: ${{ steps.sdk_meta.outputs.sdk_cache_key }}

      - name: Initialize SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          wget -q "${{ steps.sdk_meta.outputs.sdk_url }}"
          mkdir sdk
          tar -xf "${{ steps.sdk_meta.outputs.sdk_file }}" -C ./sdk --strip-components=1
          cd sdk
          {
            echo "src-git base https://github.com/openwrt/openwrt.git;${{ matrix.feeds_branch }}"
            echo "src-git-full packages https://github.com/openwrt/packages.git;${{ matrix.feeds_branch }}"
            echo "src-git-full luci https://git.openwrt.org/project/luci.git;${{ matrix.feeds_branch }}"
            echo "src-git-full routing https://git.openwrt.org/feed/routing.git;${{ matrix.feeds_branch }}"
          } > feeds.conf
          ./scripts/feeds update -a

      - name: Stage speedtest-cpp package into SDK
        run: |
          cd sdk
          rm -rf package/speedtest-cpp
          mkdir -p package/speedtest-cpp
          cp "$GITHUB_WORKSPACE/speedtestcpp/openwrt/Makefile" package/speedtest-cpp/Makefile
          # Wire the checked-out repo as the package source tree (no tarball fetch).
          # Replaces the "# USE_SOURCE_DIR_PLACEHOLDER" marker in the package Makefile.
          src_dir="$GITHUB_WORKSPACE/speedtestcpp"
          sed -i "s|# USE_SOURCE_DIR_PLACEHOLDER|USE_SOURCE_DIR:=${src_dir}|" package/speedtest-cpp/Makefile
          echo "---- staged Makefile ----"
          cat package/speedtest-cpp/Makefile
          ./scripts/feeds install -a

      - name: Configure build
        run: |
          cd sdk
          {
            echo "CONFIG_ALL_NONSHARED=n"
            echo "CONFIG_ALL_KMODS=n"
            echo "CONFIG_ALL=n"
            echo "CONFIG_AUTOREMOVE=n"
            echo "${{ matrix.extra_config }}"
            echo "CONFIG_PACKAGE_speedtest-cpp=m"
            echo "CONFIG_PACKAGE_libspeedtestcpp=m"
          } > .config
          make defconfig
          make download -j"$(nproc)" V=s || make download V=s

      - name: Compile speedtest-cpp
        id: compile
        run: |
          cd sdk
          make package/speedtest-cpp/{clean,compile} -j"$(nproc)" V=s
          mkdir -p "$GITHUB_WORKSPACE/release-artifacts"
          find bin/packages -type f \( -name "speedtest-cpp*.${{ matrix.package_ext }}" -o -name "libspeedtestcpp*.${{ matrix.package_ext }}" \) \
            -exec cp {} "$GITHUB_WORKSPACE/release-artifacts/" \;
          if ! ls "$GITHUB_WORKSPACE/release-artifacts/"*.${{ matrix.package_ext }} >/dev/null 2>&1; then
            echo "No .${{ matrix.package_ext }} package was produced"
            find bin/packages -type f | head -50
            exit 1
          fi
          ls -lh "$GITHUB_WORKSPACE/release-artifacts/"
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: speedtest-cpp-${{ matrix.openwrt_release }}-${{ matrix.arch }}
          path: release-artifacts/*.${{ matrix.package_ext }}
          if-no-files-found: error

      - name: Attach to release
        if: steps.compile.outputs.status == 'success' && github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: release-artifacts/*.${{ matrix.package_ext }}
